[phases.setup]
nixPkgs = ["python313"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
    "python src/manage.py collectstatic --no-input",
    "python src/manage.py migrate --no-input",
]

[start]
cmd = "gunicorn config.wsgi:application --chdir src --workers 2 --threads 2 --timeout 60 --bind 0.0.0.0:$PORT"
