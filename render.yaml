services:
  - type: web
    env: python
    name: aura-prj
    plan: free
    buildCommand: bash ./build.sh
    startCommand: gunicorn config.wsgi:application --chdir src
    healthCheckPath: /healthz/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DEBUG
        value: false
      - key: RUN_SEED_ON_DEPLOY
        value: true
      - key: SEED_DATASET
        value: demo
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: aura-db
          property: connectionString

databases:
  - name: aura-db
    plan: free
