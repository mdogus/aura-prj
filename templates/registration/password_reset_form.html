{% extends "base.html" %}

{% block title %}Şifre Sıfırlama | AURA{% endblock %}

{% block content %}
    <section class="panel stack" aria-labelledby="password-reset-title">
        <div class="page-intro">
            <p class="eyebrow">
                <svg class="icon" aria-hidden="true"><use href="#icon-user"></use></svg>
                Şifre işlemi
            </p>
            <h1 id="password-reset-title">Şifre sıfırlama</h1>
            <p class="muted">Geliştirme aşamasında sıfırlama e-postaları terminal çıktısına yazdırılır.</p>
        </div>

        <form method="post" novalidate>
            {% csrf_token %}
            {% include "includes/form_fields.html" with form=form %}
            <div class="form-actions">
                <button type="submit">Sıfırlama bağlantısı gönder</button>
            </div>
        </form>
    </section>
{% endblock %}
